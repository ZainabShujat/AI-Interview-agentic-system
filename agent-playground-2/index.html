<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireIntel - Autonomous AI Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        dark: '#09090b',
                        surface: '#18181b',
                        surfaceHover: '#27272a'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards'
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-premium {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f4f4f5;
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }
        .btn-premium {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.4);
        }
        .log-item { opacity: 0; animation: slideUp 0.4s ease-out forwards; }
        
        /* Custom Scrollbar for Pre tags */
        pre::-webkit-scrollbar { height: 6px; }
        pre::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 relative overflow-x-hidden">
    <!-- Decorative background blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/10 blur-[120px] pointer-events-none"></div>

    <div class="max-w-5xl mx-auto relative z-10">
        <header class="text-center mb-12 animate-slide-up">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">HireIntel <span class="gradient-text">Orchestrator</span></h1>
            <p class="text-gray-400 text-lg">Fully Autonomous AI Hiring Pipeline Demonstration</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Setup -->
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-6 animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">1</div>
                        <h2 class="text-xl font-semibold">Workflow Configuration</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5 ml-1">Recruiter Email (For notifications)</label>
                            <input type="email" id="recruiter_email" value="recruiter@example.com" class="input-premium w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5 ml-1">Candidate Email (For invite + Zoom link)</label>
                            <input type="email" id="candidate_email" value="candidate@example.com" class="input-premium w-full px-4 py-3 rounded-xl">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400">2</div>
                        <h2 class="text-xl font-semibold">Candidate Data</h2>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2 ml-1">Job Description (Upload or Paste Text)</label>
                            <input type="file" id="jd_file" accept=".txt,.pdf,.docx" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500/10 file:text-blue-400 hover:file:bg-blue-500/20 mb-3">
                            <textarea id="jd" rows="3" class="input-premium w-full px-4 py-3 rounded-xl resize-none" placeholder="Or paste text here..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2 ml-1">Candidate Resume (Upload or Paste Text)</label>
                            <input type="file" id="resume_file" accept=".txt,.pdf,.docx" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-500/10 file:text-purple-400 hover:file:bg-purple-500/20 mb-3">
                            <textarea id="resume" rows="3" class="input-premium w-full px-4 py-3 rounded-xl resize-none" placeholder="Or paste text here..."></textarea>
                        </div>
                        <button onclick="startWorkflow()" id="startBtn" class="btn-premium w-full py-4 rounded-xl font-semibold text-white shadow-lg flex justify-center items-center gap-2 mt-4">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Launch Autonomous Workflow
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Live Logs -->
            <div class="lg:col-span-7">
                <div class="glass-card p-6 h-full min-h-[600px] flex flex-col animate-slide-up" style="animation-delay: 0.3s;">
                    <div class="flex items-center justify-between mb-6 pb-4 border-b border-white/5">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <span class="relative flex h-3 w-3">
                              <span id="pulse-indicator" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75 hidden"></span>
                              <span class="relative inline-flex rounded-full h-3 w-3 bg-gray-500" id="status-dot"></span>
                            </span>
                            Live Execution Stream
                        </h2>
                        <span id="status-text" class="text-sm text-gray-400 font-medium tracking-wide uppercase">Awaiting trigger</span>
                    </div>
                    
                    <div id="timeline" class="space-y-4 overflow-y-auto flex-1 pr-2 pb-4">
                        <div class="text-center text-gray-500 italic mt-20">Press Launch to begin the orchestration sequence.</div>
                    </div>
                    
                    <div id="interactive-interview" class="hidden mt-4 p-4 rounded-xl bg-indigo-900/20 border border-indigo-500/30 flex-col h-64 shrink-0">
                        <div id="interview-chat" class="space-y-4 mb-4 flex-1 overflow-y-auto pr-2">
                            <!-- Messages go here -->
                        </div>
                        <div id="interview-input-area" class="flex gap-2 mt-auto">
                            <textarea id="interview-answer" rows="2" class="input-premium flex-1 px-3 py-2 rounded-lg resize-none text-sm" placeholder="Type your answer... (Press Enter to submit)" onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); submitAnswer(); }"></textarea>
                            <button id="submit-answer-btn" onclick="submitAnswer()" class="btn-premium px-4 py-2 rounded-lg font-semibold text-white text-sm whitespace-nowrap">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInterviewId = null;
        let currentQuestionText = "";
        let currentCategory = "";
        
        const timeline = document.getElementById('timeline');
        const startBtn = document.getElementById('startBtn');
        const pulse = document.getElementById('pulse-indicator');
        const dot = document.getElementById('status-dot');
        const statusTxt = document.getElementById('status-text');

        function addLog(title, isSuccess = true, details = null) {
            const el = document.createElement('div');
            el.className = "log-item p-4 rounded-xl bg-black/40 border border-white/5 backdrop-blur-sm";
            
            let icon = isSuccess ? 
                '<div class="flex-shrink-0 w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center text-green-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>' : 
                '<div class="flex-shrink-0 w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center text-red-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
            
            let html = `
                <div class="flex gap-4">
                    ${icon}
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white">${title}</p>
                        ${details ? `<div class="mt-3 bg-[#0a0a0a] rounded-lg border border-white/5 p-3 overflow-x-auto"><pre class="text-xs text-blue-300/80 font-mono m-0">${details}</pre></div>` : ''}
                    </div>
                </div>`;
            
            el.innerHTML = html;
            timeline.appendChild(el);
            timeline.scrollTop = timeline.scrollHeight;
        }

        async function startWorkflow() {
            // UI Reset
            timeline.innerHTML = '';
            document.getElementById('interactive-interview').classList.add('hidden');
            document.getElementById('interactive-interview').classList.remove('flex');
            document.getElementById('interview-chat').innerHTML = '';
            
            startBtn.disabled = true;
            startBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing Sequence...';
            pulse.classList.remove('hidden');
            dot.classList.replace('bg-gray-500', 'bg-green-500');
            statusTxt.innerText = "System Active";
            statusTxt.classList.replace('text-gray-400', 'text-green-400');
            
            const jdFile = document.getElementById('jd_file').files[0];
            const jdText = document.getElementById('jd').value;
            const resumeFile = document.getElementById('resume_file').files[0];
            const resumeText = document.getElementById('resume').value;

            try {
                // 1. JD Agent
                addLog("Executing JD Agent parsing...", true);
                
                let jdRes, jdData;
                if (jdFile) {
                    const formData = new FormData();
                    formData.append("file", jdFile);
                    jdRes = await fetch("https://hireintel-bv0v.onrender.com/api/jd/upload", {
                        method: "POST", body: formData
                    });
                    jdData = await jdRes.json();
                } else if (jdText.trim()) {
                    jdRes = await fetch("https://hireintel-bv0v.onrender.com/api/jd", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text: jdText })
                    });
                    jdData = await jdRes.json();
                } else {
                    throw new Error("Please upload a JD file or paste JD text.");
                }
                
                if (!jdRes.ok) throw new Error(JSON.stringify(jdData));
                addLog("JD Blueprint generated successfully", true, JSON.stringify(jdData.parsed, null, 2));

                // 2. Resume Agent
                addLog("Executing Resume Agent parsing...", true);
                let resumeRes, resumeData;
                
                const resFormData = new FormData();
                if (resumeFile) {
                    resFormData.append("file", resumeFile);
                } else if (resumeText.trim()) {
                    const blob = new Blob([resumeText], { type: "text/plain" });
                    resFormData.append("file", blob, "resume.txt");
                } else {
                    throw new Error("Please upload a Resume file or paste Resume text.");
                }
                
                resumeRes = await fetch("https://hireintel-bv0v.onrender.com/api/resume", {
                    method: "POST", body: resFormData
                });
                resumeData = await resumeRes.json();
                
                if (!resumeRes.ok) throw new Error(JSON.stringify(resumeData));
                addLog("Resume parsed and structured", true, JSON.stringify(resumeData.parsed, null, 2));

                // 3. Match Agent
                addLog("Calculating Deterministic Match Score...", true);
                const matchRes = await fetch("https://hireintel-bv0v.onrender.com/api/match/raw", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ resume_data: resumeData, jd_data: jdData })
                });
                const matchData = await matchRes.json();
                addLog(`Candidate Readiness Score: ${matchData.match_score}/100`, true, JSON.stringify(matchData, null, 2));

                // 4. Interview Planner
                addLog("Interview Planner outlining roadmap...", true);
                const startRes = await fetch("https://hireintel-bv0v.onrender.com/api/interview/start", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        resume_id: resumeData.id, jd_id: jdData.id, raw_jd_data: jdData, raw_resume_data: resumeData
                    })
                });
                const startData = await startRes.json();
                addLog("Interview Agent generated opening probe", true, `Roadmap: ${JSON.stringify(startData.roadmap)}`);
                
                currentInterviewId = startData.interview_id;
                currentQuestionText = startData.question;
                currentCategory = startData.category;

                // Show Interactive Interview UI
                document.getElementById('interactive-interview').classList.remove('hidden');
                document.getElementById('interactive-interview').classList.add('flex');
                addChatMessage("Agent", currentQuestionText);
                
                statusTxt.innerText = "Awaiting Candidate Answer";
                
                // Do not re-enable start button yet, waiting for interview to finish.
            } catch (error) {
                addLog("Error: Ensure FastAPI is running locally on port 8000 or check inputs.", false, error.toString());
                statusTxt.innerText = "Pipeline Failed";
                statusTxt.classList.replace('text-green-400', 'text-red-400');
                
                pulse.classList.add('hidden');
                startBtn.disabled = false;
                startBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Launch Autonomous Workflow';
            }
        }

        function addChatMessage(sender, text, statsHtml = '') {
            const chatBox = document.getElementById('interview-chat');
            const el = document.createElement('div');
            
            if (sender === "Agent") {
                el.className = "flex flex-col items-start gap-1";
                el.innerHTML = `
                    <div class="text-[10px] text-gray-400 font-bold uppercase">AI Interviewer</div>
                    <div class="bg-blue-900/30 border border-blue-500/20 text-blue-100 px-4 py-3 rounded-xl rounded-tl-none max-w-[90%] text-sm">
                        ${text}
                    </div>
                `;
            } else {
                el.className = "flex flex-col items-end gap-1 mt-2";
                el.innerHTML = `
                    <div class="text-[10px] text-gray-400 font-bold uppercase">Candidate (You)</div>
                    <div class="bg-purple-900/30 border border-purple-500/20 text-purple-100 px-4 py-3 rounded-xl rounded-tr-none max-w-[90%] text-sm">
                        ${text}
                        ${statsHtml}
                    </div>
                `;
            }
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
            timeline.scrollTop = timeline.scrollHeight;
        }

        async function submitAnswer() {
            const answerInput = document.getElementById('interview-answer');
            const answer = answerInput.value.trim();
            if (!answer) return;
            
            const submitBtn = document.getElementById('submit-answer-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Evaluating...";
            answerInput.value = "";
            
            addChatMessage("User", answer);
            
            const start = Date.now();
            const mockSignals = {
                latencySeconds: 10,
                wordCount: answer.split(/\\s+/).filter(Boolean).length,
                face_visible: true, speaking_ratio: 0.8, background_noise: 0.1, gaze_centered: true
            };
            
            try {
                const answerRes = await fetch("https://hireintel-bv0v.onrender.com/api/interview/answer", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        interview_id: currentInterviewId,
                        question_text: currentQuestionText,
                        answer_text: answer,
                        category: currentCategory,
                        signals: mockSignals
                    })
                });
                const answerData = await answerRes.json();
                
                if (answerData.evaluation) {
                    const evalStats = `
                        <div class="mt-2 pt-2 border-t border-purple-500/20 flex gap-3 text-[10px] text-purple-300 font-semibold">
                            <span>Acc: ${answerData.evaluation.accuracy || 0}%</span>
                            <span>Depth: ${answerData.evaluation.depth || 0}%</span>
                            <span>Comm: ${answerData.evaluation.communication || 0}%</span>
                        </div>
                    `;
                    // Note: We don't have a direct way to update the previous message easily without IDs, 
                    // so we'll just log the evaluation in the timeline.
                    addLog("Judge Agent Evaluated Answer", true, JSON.stringify(answerData.evaluation, null, 2));
                }

                if (answerData.finished) {
                    document.getElementById('interactive-interview').classList.add('hidden');
                    document.getElementById('interactive-interview').classList.remove('flex');
                    finishWorkflow();
                } else {
                    currentQuestionText = answerData.question;
                    currentCategory = answerData.category;
                    addChatMessage("Agent", currentQuestionText);
                }
            } catch (error) {
                addLog("Error submitting answer", false, error.toString());
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit";
            }
        }

        async function finishWorkflow() {
            const statusTxt = document.getElementById('status-text');
            const pulse = document.getElementById('pulse-indicator');
            const startBtn = document.getElementById('startBtn');
            
            try {
                // 6. Generate Report
                addLog("Report Agent compiling final assessment...", true);
                const reportRes = await fetch(`https://hireintel-bv0v.onrender.com/api/interview/report?interview_id=${currentInterviewId}`);
                const reportData = await reportRes.json();
                
                const score = reportData.overallScore || 0;
                addLog(`Final Candidate Score: ${score}/100`, score >= 60, JSON.stringify(reportData, null, 2));

                if (score >= 60) {
                    // 7. Orchestrator
                    addLog("Score >= 60. Workflow Orchestrator triggering downstream external services...", true);
                    const rEmail = document.getElementById('recruiter_email').value;
                    const cEmail = document.getElementById('candidate_email').value;

                    const orchRes = await fetch("https://hireintel-bv0v.onrender.com/workflow/test-orchestrator", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ recruiter_email: rEmail, candidate_email: cEmail })
                    });
                    
                    if (orchRes.ok) {
                        const orchData = await orchRes.json();
                        if (orchData.success) {
                            addLog("Scheduling Engine verified earliest mutual overlap", true);
                            addLog("Zoom Service created private meeting room", true, `Meeting URL: ${orchData.zoom_url}`);
                            addLog("SendGrid dispatched encrypted invitations", true, `Delivered to: \n- ${cEmail}\n- ${rEmail}`);
                            addLog("End-to-End Orchestration Complete", true);
                            
                            statusTxt.innerText = "Sequence Complete";
                        } else {
                            addLog("Orchestrator encountered a constraint", false, orchData.message);
                            statusTxt.innerText = "Constraint Detected";
                            statusTxt.classList.replace('text-green-400', 'text-yellow-400');
                        }
                    } else {
                        addLog("Backend API Error", false, await orchRes.text());
                    }
                } else {
                    addLog("Candidate Score below 60. Orchestration stopped. Rejection email queued.", false, "No Zoom or Email invites sent.");
                    statusTxt.innerText = "Candidate Rejected";
                    statusTxt.classList.replace('text-green-400', 'text-red-400');
                }
            } catch (error) {
                addLog("Error finishing workflow", false, error.toString());
            } finally {
                pulse.classList.add('hidden');
                startBtn.disabled = false;
                startBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Launch Autonomous Workflow';
            }
        }
    </script>
</body>
</html>
